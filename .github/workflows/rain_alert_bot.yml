name: Rain Alert

on:
  schedule:
    # ╔═══════════════════════════════════════════════════════════════╗
    # ║  CHANGE THE LINE BELOW to set when your script runs           ║
    # ║                                                               ║
    # ║  Format:  'MINUTE HOUR * * *'                                 ║
    # ║                                                               ║
    # ║  Examples:                                                    ║
    # ║    '0 9 * * *'   = 9:00 AM UTC daily                          ║
    # ║    '30 14 * * *' = 2:30 PM UTC daily                          ║
    # ║    '0 0 * * *'   = Midnight UTC daily                         ║
    # ║                                                               ║
    # ║  Use https://time.is/UTC to find your local time in UTC       ║
    # ╚═══════════════════════════════════════════════════════════════╝
    - cron: '0 12 * * *'

  # This adds a "Run workflow" button so you can test manually
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_for_rain_alert.txt

      - name: Run script
        env:
          # Your secrets are available as environment variables
          # Add more secrets in Settings > Secrets > Actions
          OWM_ACCOUNT_SID: ${{ secrets.OWM_account_sid }}
          OWM_API_KEY: ${{ secrets.OWM_api_key }}
          OWM_AUTH_TOKEN: ${{ secrets.OWM_auth_token }}
          TZ: 'America/Los_Angeles'
        run: python rain_alert.py
